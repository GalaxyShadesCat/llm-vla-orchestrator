# Orchestrator mode selector.
pipeline:
  type: chess_turn

# Shared run artefact directory.
run_dir: runs

# Chess turn pipeline configuration.
chess:
  # Confidence gate used only if recogniser returns a confidence value.
  # chesscog CLI currently does not return confidence, so legal move matching is primary.
  legal_match_min_confidence: 0.75

  # Emit synthetic full FEN for downstream tools.
  emit_full_fen: true
  full_fen_defaults:
    side_to_move: w
    castling: "-"
    en_passant: "-"
    halfmove: 0
    fullmove: 1

  # Directory-based camera interface.
  camera:
    inbox_dir: data/chess_camera/inbox
    current_filename: current.jpg

  # Persistent game memory, shared across runs.
  memory:
    state_path: data/chess_camera/state/game_state.json
    initial_fen: rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1
    # Set true to reset memory each run. Default is append/persist.
    reset_on_start: false
    # Optional note added to this turn's journal entry.
    turn_note: ""

  # chesscog integration.
  recogniser:
    python_executable: /home/lem/miniconda3/envs/llm-vla-orchestrator/bin/python
    module: chesscog.recognition.recognition
    assume_white_bottom: true

# Retry controls (easy to tune).
retries:
  max_vision_retries_per_turn: 3
  max_execution_retries_per_turn: 3
